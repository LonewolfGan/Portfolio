<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect early for external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS prefetch for faster resolution -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Primary SEO -->
    <title>TCHOHLO K. Honore | Junior Full-Stack Developer</title>
    <meta
      name="description"
      content="TCHOHLO K. Honore — Junior Full-Stack Developer specialising in React, Node.js and WordPress. Clean interfaces, powerful websites, deployed products."
    />
    <meta
      name="keywords"
      content="full-stack developer, React developer, Node.js, WordPress, portfolio, junior developer, TypeScript, Python"
    />
    <meta name="author" content="TCHOHLO K. Honore" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_APP_URL%/" />
    <meta
      property="og:title"
      content="TCHOHLO K. Honore | Junior Full-Stack Developer"
    />
    <meta
      property="og:description"
      content="Junior Full-Stack Developer building clean React interfaces and powerful WordPress websites."
    />
    <meta
      property="og:image"
      content="https://res.cloudinary.com/dbkjpn2db/image/upload/v1778522428/og-image_b72pfd.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="TCHOHLO K. Honore | Junior Full-Stack Developer"
    />
    <meta
      name="twitter:description"
      content="Junior Full-Stack Developer building clean React interfaces and powerful WordPress websites."
    />
    <meta
      name="twitter:image"
      content="https://res.cloudinary.com/dbkjpn2db/image/upload/v1778522428/og-image_b72pfd.png"
    />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2d7a3a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TCHOHLO K. Honore" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/brand.ico" />

    <!-- Async font loading to prevent render blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Preload LCP image for faster paint -->
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dbkjpn2db/image/upload/v1778522425/profile_t0csqu.webp"
      type="image/webp"
      fetchpriority="high"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
