<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https://res.cloudinary.com https://cdn.jsdelivr.net;
      connect-src 'self' https://hdev.is-a.dev http://localhost:3001;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
    " />

    <!-- Security: Additional headers via meta tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Preconnect early for external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!-- DNS prefetch for faster resolution -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!-- Primary SEO -->
    <title>TCHOHLO K. Honore | Junior Full-Stack Developer</title>
    <meta
      name="description"
      content="TCHOHLO K. Honore — Junior Full-Stack Developer specialising in React, Node.js and WordPress. Clean interfaces, powerful websites, deployed products."
    />
    <meta
      name="keywords"
      content="full-stack developer, React developer, Node.js, WordPress, portfolio, junior developer, TypeScript, Python"
    />
    <meta name="author" content="TCHOHLO K. Honore" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hdev.is-a.dev/" />
    <meta
      property="og:title"
      content="TCHOHLO K. Honore | Junior Full-Stack Developer"
    />
    <meta
      property="og:description"
      content="Junior Full-Stack Developer building clean React interfaces and powerful WordPress websites."
    />
    <meta
      property="og:image"
      content="https://res.cloudinary.com/dbkjpn2db/image/upload/v1778522428/og-image_b72pfd.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="TCHOHLO K. Honore | Junior Full-Stack Developer"
    />
    <meta
      name="twitter:description"
      content="Junior Full-Stack Developer building clean React interfaces and powerful WordPress websites."
    />
    <meta
      name="twitter:image"
      content="https://res.cloudinary.com/dbkjpn2db/image/upload/v1778522428/og-image_b72pfd.png"
    />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2d7a3a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TCHOHLO K. Honore" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/brand.ico" />

    <!-- Performance: Async font loading to prevent render blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Performance: Preload LCP image for faster paint -->
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dbkjpn2db/image/upload/v1778522425/profile_t0csqu.webp"
      type="image/webp"
      fetchpriority="high"
    />
  </head>
  <body>
    <!-- Accessibility: Skip to content link -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[9999] focus:px-4 focus:py-2 focus:bg-primary focus:text-background focus:rounded-lg focus:text-sm focus:font-semibold focus:outline-none focus:ring-2 focus:ring-primary/50">
      Skip to main content
    </a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
